galaxy_info:
  role_name: kernel
  author: shieldbuntu
  description: Kernel hardening via sysctl
  license: TBD
  min_ansible_version: "2.16"
  platforms:
    - name: Ubuntu
      versions:
        - noble

shieldbuntu:
  name: Kernel hardening
  description: >-
    Hardens kernel parameters via sysctl: network stack protections, ASLR,
    pointer/dmesg restrictions, BPF JIT hardening, and core dump suppression.
  category: kernel
  cis_refs:
    - "3.2.1"
    - "3.2.2"
    - "3.2.3"
    - "3.2.4"
    - "3.3.1"
    - "3.3.2"
    - "1.5.1"
    - "1.5.3"
  profiles:
    - cis-l1
    - cis-l2
    - server
    - workstation
  capabilities:
    - apply
    - check
    - revert
  requires_root: true
  tags:
    - sysctl
    - kernel
    - network
