galaxy_info:
  role_name: unused-packages
  author: shieldbuntu
  description: Remove orphaned and unused packages
  license: TBD
  min_ansible_version: "2.16"
  platforms:
    - name: Ubuntu
      versions:
        - noble

shieldbuntu:
  name: Unused packages
  description: >-
    Removes packages installed as dependencies that are no longer needed,
    then runs apt clean to free disk and reduce attack surface.
  category: packages
  cis_refs: []
  profiles:
    - cis-l1
    - cis-l2
    - server
    - workstation
  capabilities:
    - apply
    - check
  requires_root: true
  tags:
    - apt
    - cleanup
