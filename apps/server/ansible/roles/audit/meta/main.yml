galaxy_info:
  role_name: audit
  author: shieldbuntu
  description: auditd with a baseline ruleset
  license: TBD
  min_ansible_version: "2.16"
  platforms:
    - name: Ubuntu
      versions:
        - noble

shieldbuntu:
  name: Audit (auditd)
  description: >-
    Installs auditd plus a baseline ruleset that watches sensitive system
    files (passwd, shadow, sudoers) and key syscalls.
  category: audit
  cis_refs:
    - "4.1.1.1"
    - "4.1.1.2"
    - "4.1.2.1"
    - "4.1.3.1"
  profiles:
    - cis-l2
    - server
  capabilities:
    - apply
    - check
    - revert
  requires_root: true
  tags:
    - audit
    - auditd
