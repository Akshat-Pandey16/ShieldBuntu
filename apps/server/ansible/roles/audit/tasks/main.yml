- name: Install auditd
  ansible.builtin.apt:
    name: "{{ audit_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Write ShieldBuntu audit rules
  ansible.builtin.copy:
    dest: "{{ audit_rules_file }}"
    content: "{{ audit_rules_content }}"
    mode: "0640"
    owner: root
    group: root
  register: audit_rules_written

- name: Reload audit rules
  ansible.builtin.command: augenrules --load
  when: audit_rules_written.changed
  changed_when: audit_rules_written.changed

- name: Enable and start auditd
  ansible.builtin.systemd:
    name: auditd
    enabled: true
    state: started
