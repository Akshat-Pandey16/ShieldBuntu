- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Write ShieldBuntu jail config
  ansible.builtin.copy:
    dest: "{{ fail2ban_jail_file }}"
    content: "{{ fail2ban_jail_content }}"
    mode: "0644"
    owner: root
    group: root
  notify: restart fail2ban

- name: Ensure fail2ban is enabled and running
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
