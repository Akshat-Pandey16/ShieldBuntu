- name: Install AppArmor packages
  ansible.builtin.apt:
    name: "{{ apparmor_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure AppArmor service is enabled and started
  ansible.builtin.systemd:
    name: apparmor
    enabled: true
    state: started

- name: Read current GRUB_CMDLINE_LINUX value
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      grep -E '^GRUB_CMDLINE_LINUX=' {{ apparmor_grub_file }} \
        | sed -E 's/^GRUB_CMDLINE_LINUX="(.*)"$/\1/' || true
  args:
    executable: /bin/bash
  register: apparmor_grub_current
  changed_when: false

- name: Compute merged cmdline token list
  ansible.builtin.set_fact:
    apparmor_grub_tokens: >-
      {{
        (apparmor_grub_current.stdout | default('') | split + apparmor_required_cmdline)
        | reject('equalto', '')
        | unique
        | list
      }}

- name: Enable AppArmor on the kernel cmdline (merge with existing tokens)
  ansible.builtin.lineinfile:
    path: "{{ apparmor_grub_file }}"
    regexp: '^GRUB_CMDLINE_LINUX=".*"$'
    line: 'GRUB_CMDLINE_LINUX="{{ apparmor_grub_tokens | join('' '') }}"'
    create: true
    backrefs: false
  register: apparmor_grub_updated

- name: Rebuild GRUB config if cmdline changed
  ansible.builtin.command: update-grub
  when: apparmor_grub_updated.changed
  changed_when: apparmor_grub_updated.changed

- name: Switch all loaded profiles to enforce mode
  ansible.builtin.command: aa-enforce /etc/apparmor.d/*
  register: apparmor_enforce
  changed_when: "'Setting' in apparmor_enforce.stdout"
  failed_when: false
