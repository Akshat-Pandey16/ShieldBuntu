- name: Stat fstab snapshot
  ansible.builtin.stat:
    path: "{{ no_exec_fstab_backup }}"
  register: no_exec_backup_stat

- name: Restore fstab from snapshot
  ansible.builtin.copy:
    src: "{{ no_exec_fstab_backup }}"
    dest: "{{ no_exec_fstab }}"
    remote_src: true
    mode: "0644"
    owner: root
    group: root
  when: no_exec_backup_stat.stat.exists
  register: no_exec_restore

- name: Remove ShieldBuntu mount entries when no backup exists
  ansible.posix.mount:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ no_exec_mounts }}"
  loop_control:
    label: "{{ item.path }}"
  when: not no_exec_backup_stat.stat.exists
  failed_when: false

- name: Remount affected mountpoints (uses restored fstab opts)
  ansible.builtin.command:
    cmd: "mount -o remount {{ item.path }}"
  loop: "{{ no_exec_mounts }}"
  loop_control:
    label: "{{ item.path }}"
  changed_when: true
  failed_when: false

- name: Drop fstab backup after successful restore
  ansible.builtin.file:
    path: "{{ no_exec_fstab_backup }}"
    state: absent
  when: no_exec_restore is defined and no_exec_restore is success
