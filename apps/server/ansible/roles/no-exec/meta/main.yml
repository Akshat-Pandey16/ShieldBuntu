galaxy_info:
  role_name: no-exec
  author: shieldbuntu
  description: noexec/nosuid/nodev mount hardening for ephemeral filesystems
  license: TBD
  min_ansible_version: "2.16"
  platforms:
    - name: Ubuntu
      versions:
        - noble

shieldbuntu:
  name: noexec mounts
  description: >-
    Mounts /tmp, /var/tmp, and /dev/shm with noexec, nosuid, nodev to stop
    binaries from executing out of world-writable directories. Backs up
    fstab first.
  category: filesystem
  cis_refs:
    - "1.1.2.1"
    - "1.1.2.2"
    - "1.1.2.3"
    - "1.1.3.1"
    - "1.1.3.2"
    - "1.1.3.3"
  profiles:
    - cis-l1
    - cis-l2
    - server
    - workstation
  capabilities:
    - apply
    - check
    - revert
  requires_root: true
  tags:
    - filesystem
    - mount
