- name: Remove ShieldBuntu auto-update drop-ins
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ auto_updates_dropin }}"
    - "{{ auto_updates_policy_dropin }}"

- name: Disable unattended-upgrades service
  ansible.builtin.systemd:
    name: unattended-upgrades
    enabled: false
    state: stopped
  failed_when: false
