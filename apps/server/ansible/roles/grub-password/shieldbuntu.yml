name: GRUB password
description: Sets a PBKDF2 password on the GRUB bootloader so unauthenticated users
  can't edit kernel command-line parameters at boot. UI collects the password via
  the declared `grub_password_plain` input.
category: bootloader
cis_refs:
- 1.4.1
- 1.4.2
profiles:
- cis-l1
- cis-l2
- server
capabilities:
- apply
- revert
requires_root: true
tags:
- grub
- bootloader
inputs:
- name: grub_password_plain
  label: GRUB superuser password
  description: Password assigned to the GRUB superuser; required to edit boot
    parameters at boot time.
  secret: true
  required: true
