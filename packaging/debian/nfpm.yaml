# nfpm config for the ShieldBuntu .deb.
# Build: `bash packaging/debian/build.sh` (uses nfpm + this manifest).

name: shieldbuntu
arch: amd64
platform: linux
version: ${VERSION}
section: admin
priority: optional
maintainer: Akshat Pandey <noreply@example.com>
description: |
  ShieldBuntu — Ubuntu hardening service.
  Ansible-driven security hardening with a local web UI.
vendor: ShieldBuntu
homepage: https://github.com/Akshat-Pandey16/ShieldBuntu
license: TBD

depends:
  - python3 (>= 3.12)
  - python3-venv
  - ansible (>= 2.16)
  - ufw
  - libpam0g

contents:
  # Backend zipapp (built by build.sh — Phase 5 will swap to a real wheel install)
  - src: ../../packaging/dist/shieldbuntu-server
    dst: /usr/bin/shieldbuntu-server
    file_info:
      mode: 0755

  # Ansible roles + playbooks (read by the service at runtime)
  - src: ../../apps/server/ansible
    dst: /usr/share/shieldbuntu/ansible

  # Built frontend bundle
  - src: ../../apps/web/dist
    dst: /usr/share/shieldbuntu/web

  # systemd unit
  - src: ../systemd/shieldbuntu.service
    dst: /lib/systemd/system/shieldbuntu.service

  # Writable data dir
  - dst: /var/lib/shieldbuntu
    type: dir
    file_info:
      mode: 0750
      owner: root
      group: root

scripts:
  postinstall: ./postinst
  preremove: ./prerm
